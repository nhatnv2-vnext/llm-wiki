name: Wiki CI

on:
  pull_request:
    paths:
      - "02_Wiki/**"
      - "System/**"
      - ".github/workflows/wiki-ci.yml"
  push:
    branches: [main]
    paths:
      - "02_Wiki/**"
      - "System/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install System deps
        run: npm install --prefix System --ignore-scripts

      - name: Lint frontmatter
        run: bash System/agent_skills/lint_specs.sh

      - name: Audit wikilinks
        run: node System/agent_skills/audit_links.js

      - name: Build vault index (dry-run check)
        run: node System/agent_skills/build_vault_index.js

      - name: Stats (info only)
        run: node System/agent_skills/vault_stats.js
        continue-on-error: true

  pr-summary:
    needs: validate
    # Chỉ chạy trên PR (push lên main không cần comment).
    # if: always() để vẫn post comment kể cả khi validate fail (link tới checks tab).
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install System deps (gray-matter)
        run: npm install --prefix System --ignore-scripts

      - name: Post / update PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./System/agent_skills/pr_summary.js');
            await script({ github, context, core });
